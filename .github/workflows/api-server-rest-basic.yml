name: api-server-rest basic build and unit tests

on:
  push:
    branches:
      - "main"
    paths:
      - 'api-server-rest/**'
      - '.github/workflows/api-server-rest-basic.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'api-server-rest/**'
      - '.github/workflows/api-server-rest-basic.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  create:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  basic_ci:
    if: github.event_name != 'push'
    name: Check
    defaults:
      run:
        working-directory: ./api-server-rest
    strategy:
      fail-fast: false
      matrix:
        instance:
          - ubuntu-24.04
          - ubuntu-24.04-s390x
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.instance }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Code checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt, clippy

      - name: Build and install with default features
        run: |
          mkdir -p ${HOME}/.local/bin
          make && make install PREFIX=${HOME}/.local

      - name: Musl build with default features
        run: |
          make LIBC=musl
        if: ${{ !endsWith(matrix.instance, 's390x') }}

      - name: Run cargo test
        run: cargo test -p api-server-rest
